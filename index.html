<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet"  href="index.css">
    <title>Document</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }

        #qibla-arrow {
           
            transition: transform 0.15s ease-out;
        }
    </style>
</head>
<body>
    <img id="qibla-arrow" src="306629-200.png" style="width: 100px; transform-origin: center;">
    <button id="enable-btn">Enable Compass</button>
    <div id="debug" style="position: fixed; bottom: 10px; left: 10px; background: white; padding: 10px; font-family: monospace;"></div>
</body>
<script>
    let qiblaBearing = 0;

navigator.geolocation.getCurrentPosition(async(position) => {
    var lat = position.coords.latitude;
    var lon = position.coords.longitude;
    qiblaBearing = getQiblaDirection(lat, lon);
})

function getQiblaDirection(lat, lon)  {

 const kaabaLat = 21.4225 * Math.PI / 180;
  const kaabaLon = 39.8262 * Math.PI / 180;
  const userLat = lat * Math.PI / 180;
  const userLon = lon * Math.PI / 180;

  const deltaLon = kaabaLon - userLon;
  const y = Math.sin(deltaLon) * Math.cos(kaabaLat);
  const x = Math.cos(userLat) * Math.sin(kaabaLat) -
            Math.sin(userLat) * Math.cos(kaabaLat) * Math.cos(deltaLon);
  let bearing = Math.atan2(y, x) * 180 / Math.PI;
  return (bearing + 360) % 360; 
}


function handleOrientation(event) {
    let heading;
    if (event.webkitCompassHeading !== undefined) {
       
        heading = event.webkitCompassHeading;
    } else {
       
        heading =  event.alpha;
    }

    const rotation = (qiblaBearing - heading + 180) % 360;
    document.getElementById('qibla-arrow').style.transform = `rotate(${rotation}deg)`;
}

document.getElementById('enable-btn').addEventListener('click', async () => {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
     
        const response = await DeviceOrientationEvent.requestPermission();
        if (response === 'granted') {
            window.addEventListener('deviceorientation', handleOrientation);
            document.getElementById('enable-btn').style.display = 'none';
        } else {
            alert('Permission denied.');
        }
    } else {
        
        window.addEventListener('deviceorientationabsolute', handleOrientation);
        document.getElementById('enable-btn').style.display = 'none';
    }
});

</script>
</html>
